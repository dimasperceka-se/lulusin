                  $ref: "#/components/schemas/RankingEntry"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: ["string", "null"]
        targetInstitution:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        verificationToken:
          type: ["string", "null"]
          description: Email verification token; only present on /auth/register. Frontend uses this to send the verify email via EmailJS.

    VerifyEmailInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ResendVerificationInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ResendVerificationResult:
      type: object
      required: [verificationToken, email, name]
      properties:
        verificationToken:
          type: string
        email:
          type: string
        name:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ForgotPasswordResult:
      type: object
      required: [resetToken, email, name]
      properties:
        resetToken:
          type: string
        email:
          type: string
        name:
          type: string

    ResetPasswordInput:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        targetInstitution:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]

    # User
    User:
      type: object
      required: [id, name, email, role, isEmailVerified, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, tutor, student, referral_holder]
        avatar:
          type: ["string", "null"]
        targetInstitution:
          type: ["string", "null"]
        isEmailVerified:
          type: boolean
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]

    UserList:
      type: object
      required: [users, total, page, limit]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # Package
    Package:
      type: object
      required: [id, name, description, price, durationDays, category, isActive, maintenanceMode, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          description: Price of the Free tier (typically 0). Used as the headline price.
        priceBasic:
          type: ["integer", "null"]
          description: Price for the Premium Basic tier. Null disables the tier.
        priceAdvance:
          type: ["integer", "null"]
          description: Price for the Premium Advance tier. Null disables the tier.
        durationDays:
          type: integer
        category:
          type: string
          enum: [CPNS, SD, SMP, SMA]
        thumbnail:
          type: ["string", "null"]
        isActive:
          type: boolean
        maintenanceMode:
          type: boolean
          description: When true, package is visible but checkout is disabled.
        createdAt:
          type: string
        materialCount:
          type: ["integer", "null"]
        quizCount:
          type: ["integer", "null"]
        tryoutCount:
          type: ["integer", "null"]

    PackageDetail:
      type: object
      required: [id, name, description, price, durationDays, category, isActive, maintenanceMode, createdAt, materials, quizzes, tryouts]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: integer
        priceBasic:
          type: ["integer", "null"]
        priceAdvance:
          type: ["integer", "null"]
        durationDays:
          type: integer
        category:
          type: string
        thumbnail:
          type: ["string", "null"]
        isActive:
          type: boolean
        maintenanceMode:
          type: boolean
        createdAt:
          type: string
        materials:
          type: array
          items:
            $ref: "#/components/schemas/Material"
        quizzes:
          type: array
          items:
            $ref: "#/components/schemas/Quiz"
        tryouts:
          type: array
          items:
            $ref: "#/components/schemas/Tryout"

    PackageInput:
      type: object
      required: [name, description, price, durationDays, category]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: integer
        priceBasic:
          type: ["integer", "null"]
        priceAdvance:
          type: ["integer", "null"]
        durationDays:
          type: integer
        category:
          type: string
          enum: [CPNS, SD, SMP, SMA]
        thumbnail:
          type: ["string", "null"]
        isActive:
          type: boolean

    PackageUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: integer
        priceBasic:
          type: ["integer", "null"]
        priceAdvance:
          type: ["integer", "null"]
        durationDays:
          type: integer
        category:
          type: string
        thumbnail:
          type: ["string", "null"]
        isActive:
          type: boolean

    # Bank Account
    BankAccount:
      type: object
      required: [id, bankName, accountNumber, accountHolder, isActive]
      properties:
        id:
          type: integer
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolder:
          type: string
        isActive:
          type: boolean

    BankAccountInput:
      type: object
      required: [bankName, accountNumber, accountHolder]
      properties:
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolder:
          type: string
        isActive:
          type: boolean

    BankAccountUpdate:
      type: object
      properties:
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolder:
          type: string
        isActive:
          type: boolean

    # Order
    Order:
      type: object
      required: [id, userId, packageId, orderCode, amount, uniqueAmount, status, paymentMethod, expiredAt, createdAt, tier]
      properties:
        id:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
        orderCode:
          type: string
        amount:
          type: integer
        uniqueAmount:
          type: integer
        tier:
          type: string
          enum: [free, basic, advance]
        status:
          type: string
          enum: [PENDING, WAITING_VERIFICATION, PAID, EXPIRED, REJECTED]
        paymentMethod:
          type: string
          enum: [BANK_TRANSFER, QRIS]
        paymentProof:
          type: ["string", "null"]
        expiredAt:
          type: string
        paidAt:
          type: ["string", "null"]
        rejectionReason:
          type: ["string", "null"]
        referralCode:
          type: ["string", "null"]
        referralHolderId:
          type: ["integer", "null"]
        discountAmount:
          type: integer
        createdAt:
          type: string
        qrisContent:
          type: ["string", "null"]
          description: Raw EMVCo QRIS payload (render to QR client-side). Null if not generated.
        qrisInvoiceId:
          type: ["string", "null"]
        qrisNmid:
          type: ["string", "null"]
        qrisGeneratedAt:
          type: ["string", "null"]
        package:
          $ref: "#/components/schemas/Package"
        bankAccounts:
          type: array
          items:
            $ref: "#/components/schemas/BankAccount"

    OrderInput:
      type: object
      required: [packageId]
      properties:
        packageId:
          type: integer
        tier:
          type: string
          enum: [basic, advance]
          description: Tier to purchase. Free tier does not go through orders — use POST /enrollments/free instead.
        paymentMethod:
          type: string
          enum: [BANK_TRANSFER, QRIS]
        referralCode:
          type: ["string", "null"]
          description: Optional referral code applied to this order; triggers 10% discount if valid.

    OrderMethodInput:
      type: object
      required: [paymentMethod]
      properties:
        paymentMethod:
          type: string
          enum: [BANK_TRANSFER, QRIS]

    OrderList:
      type: object
      required: [orders, total, page, limit]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    PaymentProofInput:
      type: object
      required: [paymentProof]
      properties:
        paymentProof:
          type: string

    OrderVerifyInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, reject]
        rejectionReason:
          type: ["string", "null"]

    EnrollFreeInput:
      type: object
      required: [packageId]
      properties:
        packageId:
          type: integer

    # Enrollment
    Enrollment:
      type: object
      required: [id, userId, packageId, startedAt, expiredAt, isActive, tier]
      properties:
        id:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
        startedAt:
          type: string
        expiredAt:
          type: string
        isActive:
          type: boolean
        tier:
          type: string
          enum: [free, basic, advance]
        package:
          $ref: "#/components/schemas/Package"
        progressPercent:
          type: ["integer", "null"]

    # Material
    Material:
      type: object
      required: [id, packageId, title, orderIndex, createdAt, tier]
      properties:
        id:
          type: integer
        packageId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        fileUrl:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
          description: Inline markdown content (rendered client-side). When set, FE renders this instead of fileUrl.
        category:
          type: ["string", "null"]
          description: Category for grouping in UI (e.g. "TWK", "TIU", "TKP", "UMUM").
        tier:
          type: string
          enum: [free, basic, advance]
          description: Minimum tier required to access this material.
        orderIndex:
          type: integer
        createdAt:
          type: string
        isRead:
          type: ["boolean", "null"]

    MaterialInput:
      type: object
      required: [title, orderIndex]
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        fileUrl:
          type: ["string", "null"]
        orderIndex:
          type: integer

    MaterialUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        fileUrl:
          type: ["string", "null"]
        orderIndex:
          type: integer

    MaterialProgress:
      type: object
      required: [id, userId, materialId, isRead]
      properties:
        id:
          type: integer
        userId:
          type: integer
        materialId:
          type: integer
        isRead:
          type: boolean
        readAt:
          type: ["string", "null"]

    PackageProgress:
      type: object
      required: [packageId, totalMaterials, readMaterials, progressPercent]
